name: 'Ephemeral Clone Audit'
description: 'Boots an immutable Next.js twin, runs LHCI against performance budgets, and gracefully tears down.'

inputs:
  twin_image_path:
    description: 'The absolute path to the baked .sif artifact (e.g., pr_123.sif)'
    required: true
  lhci_token:
    description: 'Token for the LHCI Server'
    required: true
  audit_image_dir:
    description: 'Path to the production Singularity images (for the auditor)'
    required: true
  target_site:
    description: 'Path to the codebase (still needed for the Agent trigger)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: 🎲 Stage 1 - Allocate Dynamic Port & Init
      shell: bash
      run: |
        # Pre-cleanup
        echo "Ensuring clean slate for Run ID: ${{ github.run_id }}"
        singularity instance stop clone_${{ github.run_id }} 2>/dev/null || true
        # singularity instance stop audit_${{ github.run_id }} 2>/dev/null || true

        FREE_PORT=$(comm -23 <(seq 3060 3200 | sort) <(ss -Htan | awk '{print $4}' | cut -d':' -f2 | sort -u) | shuf | head -n 1)
        echo "TWIN_PORT=$FREE_PORT" >> $GITHUB_ENV
        echo "TWIN_NAME=clone_${{ github.run_id }}" >> $GITHUB_ENV
        echo "Assigned Port: $FREE_PORT"

    - name: 🚀 Stage 2 - Boot Digital Twin
      shell: bash
      run: |
        echo "Booting instance: ${{ inputs.twin_image_path }} on port ${{ env.TWIN_PORT }}"

        # 🚨 SRE FIX: Notice there is NO --bind flag for the workspace here!
        # The container is 100% self-contained and baked.
        singularity instance start \
          --env PORT=${{ env.TWIN_PORT }} \
          ${{ inputs.twin_image_path }} ${{ env.TWIN_NAME }}
          
        echo "⏳ Waiting for Next.js to finish building and start routing..."
        TIMEOUT=180
        ELAPSED=0
        until curl -s http://localhost:${{ env.TWIN_PORT }} > /dev/null; do
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "❌ ERROR: Twin failed to boot within $TIMEOUT seconds."
            echo "🔍 -------------------------------------------------"
            echo "🔍 DUMPING INTERNAL CONTAINER LOGS FOR DEBUGGING:"
            # This pulls the error output directly from Singularity's hidden instance logs!
            cat ~/.singularity/instances/logs/$(hostname)/${{ env.TWIN_NAME }}/*.err || echo "Could not locate error logs."
            cat ~/.singularity/instances/logs/$(hostname)/${{ env.TWIN_NAME }}/*.out || echo "Could not locate output logs."
            echo "🔍 -------------------------------------------------"
            exit 1
          fi
          printf "."
          sleep 3
          ELAPSED=$((ELAPSED+3))
        done
        echo -e "\n✅ Digital Twin is online and ready for audit!"

    - name: ⚡ Stage 3 - Execute Ephemeral Audit
      shell: bash
      env:
        LHCI_BUILD_TOKEN: ${{ inputs.lhci_token }}
        LHCI_COLLECT_URL: http://localhost:${{ env.TWIN_PORT }}/
      run: |
        echo "Firing LHCI metrics against the Digital Twin..."
        # 🚨 SRE FIX: Multi-Bind Architecture
        # 1. Bind the Next.js code folder
        # 2. Surgically bind the central config file into the same workspace
        singularity exec \
          --bind ./${{ inputs.target_site }}:/workspace \
          --bind ./4_automation_tests/lighthouse-runner/lighthouserc.js:/workspace/lighthouserc.js \
          ${{ inputs.audit_image_dir }}/infrastructure_audit_ephemeral.sif npx lhci autorun --config=/workspace/lighthouserc.js

    - name: 🛑 Mandatory Teardown
      if: always()
      shell: bash
      run: |
        echo "Executing surgical teardown for Run ID: ${{ github.run_id }}"

        # 1. Gracefully stop the Digital Twin daemon
        echo "[..] Stopping Digital Twin Instance..."
        singularity instance stop ${{ env.TWIN_NAME }} 2>/dev/null || echo "Twin cleanly stopped."

        # 2. The SRE Fail-Safe: Stop the audit instance (if it was ever booted as one)
        echo "[..] Sweeping for Audit Instances..."
        singularity instance stop audit_${{ github.run_id }} 2>/dev/null || echo "No audit instance found."

        # 3. The SRE Fail-Safe: Terminate rogue hanging processes
        # If 'singularity exec' froze and became a zombie, we forcefully kill any process
        # that contains the string "infrastructure_audit_ephemeral.sif" tied to this run.
        echo "[..] Hunting for orphaned exec processes..."
        pkill -f "infrastructure_audit_ephemeral.sif.*${{ github.run_id }}" || echo "No zombie processes detected."

        echo "✅ Teardown complete. Server environment is pristine."
