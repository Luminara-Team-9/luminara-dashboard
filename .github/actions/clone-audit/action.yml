name: 'Ephemeral Clone Audit'
description: 'Boots an immutable Next.js twin, runs LHCI against performance budgets, and gracefully tears down.'

inputs:
  twin_image_path:
    description: 'The absolute path to the baked .sif artifact (e.g., pr_123.sif)'
    required: true
  lhci_token:
    description: 'Token for the LHCI Server'
    required: true
  audit_image_dir:
    description: 'Path to the production Singularity images (for the auditor)'
    required: true
  target_site:
    description: 'Path to the codebase (still needed for the Agent trigger)'
    required: true
  lhci_user:
    description: 'Username for LHCI Basic Auth'
    required: true
  lhci_password:
    description: 'Password for LHCI Basic Auth'
    required: true
  github_token:
    description: 'The GITHUB_TOKEN to enable LHCI to post status checks'
    required: true

runs:
  using: 'composite'
  steps:
    - name: 🎲 Stage 1 - Allocate Dynamic Port & Init
      shell: bash
      run: |
        # Pre-cleanup
        echo "Ensuring clean slate for Run ID: ${{ github.run_id }}"
        singularity instance stop clone_${{ github.run_id }} 2>/dev/null || true
        # singularity instance stop audit_${{ github.run_id }} 2>/dev/null || true

        FREE_PORT=$(comm -23 <(seq 3060 3200 | sort) <(ss -Htan | awk '{print $4}' | cut -d':' -f2 | sort -u) | shuf | head -n 1)
        echo "TWIN_PORT=$FREE_PORT" >> $GITHUB_ENV
        echo "TWIN_NAME=clone_${{ github.run_id }}" >> $GITHUB_ENV
        echo "Assigned Port: $FREE_PORT"

    - name: 🚀 Stage 2 - Boot Digital Twin
      shell: bash
      run: |
        echo "Booting instance: ${{ inputs.twin_image_path }} on port ${{ env.TWIN_PORT }}"

        # 🚨 SRE FIX: Notice there is NO --bind flag for the workspace here!
        # The container is 100% self-contained and baked.
        singularity instance start \
          --env PORT=${{ env.TWIN_PORT }} \
          ${{ inputs.twin_image_path }} ${{ env.TWIN_NAME }}
          
        echo "⏳ Waiting for Next.js to finish building and start routing..."
        TIMEOUT=180
        ELAPSED=0
        until curl -s http://127.0.0.1:${{ env.TWIN_PORT }} | grep -q "__next"; do
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "❌ ERROR: Twin failed to boot within $TIMEOUT seconds."
            echo "🔍 -------------------------------------------------"
            echo "🔍 DUMPING INTERNAL CONTAINER LOGS FOR DEBUGGING:"
            # This pulls the error output directly from Singularity's hidden instance logs!
            cat ~/.singularity/instances/logs/$(hostname)/${{ env.TWIN_NAME }}/*.err || echo "Could not locate error logs."
            cat ~/.singularity/instances/logs/$(hostname)/${{ env.TWIN_NAME }}/*.out || echo "Could not locate output logs."
            echo "🔍 -------------------------------------------------"
            exit 1
          fi
          printf "."
          sleep 3
          ELAPSED=$((ELAPSED+3))
        done
        sleep 60
        echo -e "\n✅ Digital Twin is online and ready for audit!"

    - name: ⚡ Stage 3 - Execute Ephemeral Audit
      shell: bash
      run: |
        # 1. Capture Git Metadata from Host
        COMMIT_MSG=$(git log -1 --pretty=%B)
        COMMIT_TIME=$(git log -1 --format=%ct)
        
        # 2. Inject ALL Metadata (Added Commit Time and Avatar URL)
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__COMMIT_MESSAGE="$COMMIT_MSG"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__COMMIT_TIME="$COMMIT_TIME"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__CURRENT_HASH="${{ github.sha }}"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__AUTHOR="${{ github.actor }}"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__BRANCH="${{ github.ref_name }}"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__ANCESTOR_HASH="${{ github.event.pull_request.base.sha }}"
        export SINGULARITYENV_LHCI_BUILD_CONTEXT__AVATAR_URL="https://github.com/${{ github.actor }}.png"
        
        # 3. Credentials & URL
        export SINGULARITYENV_LHCI_BUILD_TOKEN="${{ inputs.lhci_token }}"
        export SINGULARITYENV_LHCI_USER="${{ inputs.lhci_user }}"
        export SINGULARITYENV_LHCI_PASS="${{ inputs.lhci_password }}"
        export SINGULARITYENV_LHCI_GITHUB_TOKEN="${{ inputs.github_token }}"
        export SINGULARITYENV_LHCI_COLLECT_URL="http://127.0.0.1:${{ env.TWIN_PORT }}/"

        AUDIT_TMP="/dev/shm/coss41_luminara/audit_tmp_${{ github.run_id }}"
        mkdir -p "$AUDIT_TMP"

        # SRE FIX: Give the Next.js Twin 10 seconds to hydrate JS before auditing
        echo "⏳ Giving Next.js hydration grace period..."
        sleep 10

        echo "🔍 DEBUG: Auditor Container's view of the Twin:"
        singularity exec \
          --bind ${{ inputs.audit_image_dir }}:/audit \
          ${{ inputs.audit_image_dir }}/infrastructure_audit_ephemeral.sif \
          curl -v http://127.0.0.1:${{ env.TWIN_PORT }} | head -n 50

        echo "🚀 Firing LHCI metrics against port ${{ env.TWIN_PORT }}..."
        singularity exec \
          --bind ${{ github.workspace }}/${{ inputs.target_site }}:/data \
          --bind ${{ github.workspace }}/4_automation_tests:/workspace \
          --bind "$AUDIT_TMP":/tmp \
          ${{ inputs.audit_image_dir }}/infrastructure_audit_ephemeral.sif \
          npx lhci autorun --config=/workspace/lighthouse-runner/lighthouserc.js \
          --collect.url=$SINGULARITYENV_LHCI_COLLECT_URL \
          --collect.settings.preset=desktop

    - name: 📸 Emergency Screenshot (One-Liner)
      if: failure()
      shell: bash
      run: |
        # SRE FIX: No Python script needed. Use the Playwright CLI directly.
        # This prevents all indentation issues.
        singularity exec \
          --env PLAYWRIGHT_BROWSERS_PATH=/usr/lib/playwright \
          ${{ inputs.audit_image_dir }}/infrastructure_audit_ephemeral.sif \
          playwright screenshot http://127.0.0.1:${{ env.TWIN_PORT }} debug_view.png
          
    - name: 📦 Upload Debug Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: lhci-debug-report-${{ github.run_id }}
        path: |
          debug_view.png
          lhci_summary.md
        retention-days: 7

    - name: 🛑 Stage 5 - Mandatory Teardown and Logs
      if: always()
      shell: bash
      run: |
        echo "------------------------------------------------"
        echo "📊 DUMPING DIGITAL TWIN LOGS (Instance: ${{ env.TWIN_NAME }})"
        echo "------------------------------------------------"
        
        find "$HOME/.singularity/instances/logs" -name "${{ env.TWIN_NAME }}.*" -exec echo "--- File: {} ---" \; -exec cat {} \; || echo "No instance logs found."

        # Check the .err file for the Twin instance
        cat ~/.singularity/instances/logs/$(hostname)/$USER/${{ env.TWIN_NAME }}.err

        echo "Executing surgical teardown for Run ID: ${{ github.run_id }}"

        # 1. Gracefully stop the Digital Twin daemon
        singularity instance stop ${{ env.TWIN_NAME }} 2>/dev/null || true

        # 2. Stop the audit instance (if any)
        singularity instance stop audit_${{ github.run_id }} 2>/dev/null || true

        # 3. Terminate rogue hanging processes
        pkill -f "infrastructure_audit_ephemeral.sif.*${{ github.run_id }}" || true

        # 4. SRE FIX: Clean up the RAM directory to prevent memory leaks
        rm -rf "/dev/shm/coss41_luminara/audit_tmp_${{ github.run_id }}"

        echo "✅ Teardown complete. Server environment is pristine."