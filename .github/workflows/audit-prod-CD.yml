name: "6. [Push-Clone_Audit] Target Clone Sync & Deploy"

on:
  push:
    branches:
      - main
    paths:
      - '2_digital_twins/active-staging/**'
      - 'infrastructure/digital_opt_clone.def'

concurrency:
  # Crucial: If two PRs merge within seconds of each other, 
  # cancel the older CD deployment and only build the newest main branch!
  group: deploy-optimized-clone
  cancel-in-progress: true

jobs:
  deploy_optimized:
    name: Build & Deploy Live Clone
    runs-on: [self-hosted, Linux]
    
    env:
      IMAGE_DIR: /abr/coss41/Luminara_App/images-prod
      ARTIFACT_NAME: infrastructure_digital_opt_clone.sif
      BACKUP_NAME: infrastructure_digital_opt_clone.bak.sif
      STAGING_DIR: /abr/coss41/Luminara_App/images-staging
      SERVICE_NAME: luminara-prod@opt_clone.service
      HEALTH_URL: http://localhost:3003

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: CREATE ROLLBACK BACKUP
      # ---------------------------------------------------------
      - name: 💾 Backup Stable Container
        run: |
          echo "Backing up current optimized clone container..."
          mkdir -p ${{ env.IMAGE_DIR }} ${{ env.STAGING_DIR }}

          if [ -f "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}" ]; then
            echo "💾 Backing up current production container..."
            cp ${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }} ${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}
          else
            echo "ℹ️ No existing production SIF found. Skipping backup."
          fi

      # ---------------------------------------------------------
      # PHASE 2: BAKE THE RELEASE ARTIFACT (Directly from Main!)
      # ---------------------------------------------------------
      - name: 🏗️ Build Fresh Release Artifact
        uses: ./.github/actions/build-sif-images
        with:
          def_file_path: "infrastructure/digital_opt_clone.def" 
          cache_key_suffix: "prod_optimized_clone"
          output_path: "${{ env.STAGING_DIR }}/${{ env.ARTIFACT_NAME }}"

      # ---------------------------------------------------------
      # PHASE 3: SYSTEMD-MANAGED HOT-SWAP & AUTOMATED ROLLBACK
      # ---------------------------------------------------------
      - name: 🚀 Systemd Hot-Swap & Health Check
        run: |
          echo "🔄 Swapping staging artifact to production..."
          
          # 1. Prepare the artifact
          # We move the 'baked' image into the production slot that the script expects
          mv "${{ env.STAGING_DIR }}/${{ env.ARTIFACT_NAME }}" "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}"

          # 2. Tell systemd to restart the specific template instance
          # This triggers ExecStop (old version) and ExecStart (new version) via your script
          echo "⚡ Restarting systemd service: ${{ env.SERVICE_NAME }}"
          systemctl --user restart ${{ env.SERVICE_NAME }}
          
          # 3. Stability check (Wait for Next.js to fully boot)
          echo "⏱️ Waiting 15 seconds for systemd to stabilize the container..."
          sleep 15

          SUCCESS=0
          if systemctl --user is-active --quiet ${{ env.SERVICE_NAME }}; then
            echo "✅ systemd reports service is ACTIVE."
            
            # 4. Deep Health Check (Network Response)
            for i in {1..15}; do
              if curl -s -o /dev/null ${{ env.HEALTH_URL }}; then
                echo "✅ Health Check Passed: Service is responding!"
                SUCCESS=1
                break
              fi
              echo "⏳ Waiting for service to respond... ($i/15)"
              sleep 2
            done
          else
            echo "❌ systemd reports service FAILED to start."
          fi

          # LOGIC FIX: If successful, clean up and EXIT 0 immediately
          if [ $SUCCESS -eq 1 ]; then
            echo "✅ Initial check passed. Waiting 10 seconds for stability test..."
            sleep 10
            if ! curl -s -o /dev/null ${{ env.HEALTH_URL }}; then
              echo "❌ CRITICAL: Service crashed after initial boot!"
              SUCCESS=0
            fi
          fi

          if [ $SUCCESS -eq 0 ]; then
            echo "❌ DEPLOYMENT FAILED. Initiating Rollback..."
            if [ -f "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}" ]; then
              mv "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}" "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}"
              systemctl --user restart ${{ env.SERVICE_NAME }}
              echo "🚨 Rollback complete. Previous stable version restored."
            else
              echo "⚠️ Rollback failed: No backup available!"
            fi
            exit 1
          fi

          echo "🚀 Deployment successful and stable."
      # ---------------------------------------------------------
      # PHASE 4: CLEANUP RAM DISK
      # ---------------------------------------------------------
      - name: 🧹 Garbage Collection
        if: always()
        run: |
          echo "🧹 Cleaning up temporary artifacts..."

          # 1. Clear staging (In case build finished but move failed)
          rm -f "${{ env.STAGING_DIR }}/${{ env.ARTIFACT_NAME }}"
          
          # 2. Clear backup (If success, it's old; if rollback, it's already moved)
          rm -f "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}"

          echo "🧹 Force-cleaning local RAM disk (Fail-safe)..."
          chmod -R u+rwX /dev/shm/sing_build_*_prod_optimized_clone 2>/dev/null || true
          rm -rf /dev/shm/sing_build_*_prod_optimized_clone || true
          rm -rf /dev/shm/sing_build_*_prod_optimized_clone || true

          echo "✨ Environment is now clean."