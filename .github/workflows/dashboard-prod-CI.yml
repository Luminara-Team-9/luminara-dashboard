name: "3. [PR-Prod] Dashboard Gatekeeper & Builder (Pure Container)"

on:
  pull_request:
    branches: [ main ]
    paths:
      - '1_dashboard_app/**'
      - '0_shared_packages/**'
      - 'infrastructure/web.def' # SRE FIX: Updated to new def file

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  STAGING_PATH: "/abr/coss41/Luminara_App/images-staging"

jobs:
  build-and-stage:
    runs-on: [self-hosted, Linux]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # SRE FIX: Completely removed the Host Node/PNPM Dry-Run.
      # The container compilation IS the dry-run now.

      # ---------------------------------------------------------
      # PHASE 1: BUILD PURE CONTAINER ARTIFACT
      # ---------------------------------------------------------
      - name: Build & Verify Dashboard Container
        uses: ./.github/actions/build-sif-images
        with:
          def_file_path: "infrastructure/web.def" # SRE FIX: Point to the Pure Container definition
          cache_key_suffix: "prod_dashboard" # Aligned suffix with the CD pipeline
          output_path: "${{ env.STAGING_PATH }}/pr_${{ github.event.pull_request.number }}.sif"

      # ---------------------------------------------------------
      # PHASE 2: GLOBAL FAIL-SAFE CLEANUP
      # ---------------------------------------------------------
      - name: Garbage Collection
        if: always()
        run: |
          echo "🧹 Force-cleaning local RAM disk (Fail-safe)..."
          chmod -R u+rwX /dev/shm/sing_build_*_prod_dashboard 2>/dev/null || true
          rm -rf /dev/shm/sing_build_*_prod_dashboard || true
          
          echo "🗑️ Running NFS Cache Garbage Collection..."
          find /abr/coss41/singularity_cache -maxdepth 1 -type d -name "cache_*" -mtime +1 -exec rm -rf {} + || true
          echo "✅ Cleanup complete."