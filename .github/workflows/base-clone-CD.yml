name: "8. [Push-Base_Clone] Base Clone Sync & Deploy"

on:
  push:
    branches:
      - main
    paths:
      - '2_digital_twins/baseline-site/**'
      # Rebuilds the baseline if the core infrastructure definition changes
      - 'infrastructure/digital_base_clone.def'

concurrency:
  # Protects against temporal race conditions if multiple baseline changes merge rapidly
  group: deploy-baseline-clone
  cancel-in-progress: true

jobs:
  deploy_baseline:
    name: Build & Deploy Live Baseline
    runs-on: [self-hosted, Linux]
    
    env:
      IMAGE_DIR: /abr/coss41/Luminara_App/images-prod
      BASE_DIR: /abr/coss41/Luminara_App
      ARTIFACT_NAME: infrastructure_digital_base_clone.sif
      BACKUP_NAME: infrastructure_digital_base_clone.bak.sif

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: CREATE ROLLBACK BACKUP
      # ---------------------------------------------------------
      - name: 💾 Backup Stable Container
        run: |
          echo "Backing up current base clone container..."
          mkdir -p ${{ env.IMAGE_DIR }}
          cp ${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }} ${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }} || echo "ℹ️ No previous SIF found to backup."

      # ---------------------------------------------------------
      # PHASE 2: BAKE THE RELEASE ARTIFACT (Directly from Main!)
      # ---------------------------------------------------------
      - name: 🏗️ Build Fresh Release Artifact
        uses: ./.github/actions/build-sif-images
        with:
          def_file_path: "infrastructure/digital_base_clone.def" 
          cache_key_suffix: "prod_baseline_clone"
          output_path: "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}"

      # ---------------------------------------------------------
      # PHASE 3: HOT-SWAP, HEALTH CHECK & AUTOMATED ROLLBACK
      # ---------------------------------------------------------
      - name: 🚀 Hot-Swap, Verify & Automated Rollback
        run: |
          echo "Rebooting live persistent Base Clone..."
          
          # Force stop and wait a moment for the port to clear
          singularity instance stop -f luminara_base_clone 2>/dev/null || true
          sleep 2
          
          # 2. Boot the freshly baked Showroom container
          # Note: Anchored to your BASE_DIR where the .env.base_clone.prod lives
          singularity instance start \
            --env-file "${{ env.BASE_DIR }}/secure_keys/.env.base_clone.prod" \
            ${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }} luminara_base_clone
            
          echo "⏱️ Waiting for Next.js to bind to port the "Address already in use" or "Missing .next folder" errors are hiding.
            4.  **Verify Firewall**: If you are accessing this from a browser outside the university network, ensure the KNU firewall has port 3001 open for your IP. ${{ env.PORT }}..."
          # Loop for 30 seconds, checking every 2 seconds
          SUCCESS=0
          for i in {1..15}; do
            if curl -s -o /dev/null http://localhost:3002; then
              echo "✅ Health Check Passed: Service is responding on 3002!"
              SUCCESS=1
              break
            fi
            echo "⏳ Waiting for service... ($i/15)"
            sleep 2
          done

          if [ $SUCCESS -eq 1 ]; then
            echo "🚀 Deployment Successful! Cleaning up backup..."
            rm -f "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}"
            exit 0
          fi

          # --- EVERYTHING BELOW THIS ONLY RUNS IF SUCCESS IS 0 ---
          echo "❌ CRITICAL FAILURE: Service never responded on port 3002."
          echo "⏪ INITIATING AUTOMATED ROLLBACK..."

          # Tear down the broken deployment
          singularity instance stop luminara_base_clone 2>/dev/null || true

          # Restore the backup artifact
          if [ -f "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}" ]; then
            mv "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}" "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}"
            
            # Reboot the stable backup
            singularity instance start \
              --env-file "${{ env.BASE_DIR }}/secure_keys/.env.base_clone.prod" \
              "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}" \
              luminara_base_clone
            echo "🚨 Rollback complete. Production Base Clone is back online."
          else
            echo "⚠️ Rollback failed!"
          fi
          
          exit 1

      # ---------------------------------------------------------
      # PHASE 4: CLEANUP RAM DISK
      # ---------------------------------------------------------
      - name: 🧹 Garbage Collection
        if: always()
        run: |
          echo "🧹 Force-cleaning local RAM disk (Fail-safe)..."
          chmod -R u+rwX /dev/shm/sing_build_*_prod_baseline_clone 2>/dev/null || true
          rm -rf /dev/shm/sing_build_*_prod_baseline_clone || true