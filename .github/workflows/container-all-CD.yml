name: "2. [Push-All] Luminara Container Deployer"

on:
  push:
    branches: [ main ]
    paths:
      - '**.def'
      - '!infrastructure/web.def'  # 🚨 THE FIX: Ignore the dashboard container!
      - '!infrastructure/digital_base_clone.def'
      - '!infrastructure/digital_opt_clone.def'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROD_RELEASE_PATH: "/abr/coss41/Luminara_App/images-prod"
  DEV_RELEASE_PATH: "/abr/coss41/shared_workspace/images_dev"
  STAGING_DIR: "/abr/coss41/Luminara_App/images-staging"

jobs:
  detect-changes:
    runs-on: [self-hosted, Linux]
    outputs:
      def_files: ${{ steps.safe_output.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - name: Get changed .def files
        id: filter
        uses: tj-actions/changed-files@v44
        with:
          files: "**/*.def"
          escape_json: false
          json: true

      - name: SRE Matrix Safety Intercept
        id: safe_output
        run: |
          FILES='${{ steps.filter.outputs.all_changed_files }}'
          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "files=[\"skip\"]" >> $GITHUB_OUTPUT
          else
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

  deploy-sif:
    needs: detect-changes
    if: needs.detect-changes.outputs.def_files != '[]' && needs.detect-changes.outputs.def_files != '["skip"]'
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        def_file: ${{ fromJson(needs.detect-changes.outputs.def_files) }}
      max-parallel: 2
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: SRE DYNAMIC ROUTING & VARIABLES
      # ---------------------------------------------------------
      - name: Set Routing Variables
        run: |
          SAFE_NAME=$(echo "${{ matrix.def_file }}" | sed 's/\//_/g' | sed 's/\.def//g')
          echo "SIF_NAME=${SAFE_NAME}.sif" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          
          # 🚦 The Routing Logic
          if [[ "${{ matrix.def_file }}" == *"_dev.def" ]]; then
            echo "TARGET_DIR=${{ env.DEV_RELEASE_PATH }}" >> $GITHUB_ENV
            echo "TIER=Development" >> $GITHUB_ENV
            echo "Detected DEV environment. Routing to dev_release."
          else
            echo "TARGET_DIR=${{ env.PROD_RELEASE_PATH }}" >> $GITHUB_ENV
            echo "TIER=Production" >> $GITHUB_ENV
            echo "Detected PROD environment. Routing to release."
          fi

      # ---------------------------------------------------------
      # PHASE 2: LOCATE STAGED ARTIFACTS
      # ---------------------------------------------------------
      - name: Locate Staged Artifacts
        id: staging_check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -o -E '#[0-9]+' | head -1 | sed 's/#//')
          STAGED_FILE="${{ env.STAGING_DIR }}/pr_${PR_NUMBER}_${{ env.SIF_NAME }}"
          
          if [ -n "$PR_NUMBER" ] && [ -f "$STAGED_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "pr_file=$STAGED_FILE" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # PHASE 3: STAGE PRE-BUILT SIF FOR ORCHESTRATION (HAPPY PATH)
      # ---------------------------------------------------------
      - name: Promote Staged Artifact
        if: steps.staging_check.outputs.found == 'true'
        run: |
          echo "✅ Found pre-built SIF from PR! Bypassing build phase."

      # ---------------------------------------------------------
      # PHASE 4: EMERGENCY FALLBACK BUILD TO STAGING AREA
      # ---------------------------------------------------------
      - name: Run Emergency Fallback Build
        if: steps.staging_check.outputs.found == 'false'
        uses: ./.github/actions/build-sif-images
        with:
          def_file_path: "${{ matrix.def_file }}"
          cache_key_suffix: "emergency_${{ env.SAFE_NAME }}"
          output_path: "${{ env.STAGING_DIR }}/${{ env.SIF_NAME }}"

      # ---------------------------------------------------------
      # PHASE 5: SERVICE MAPPING & HOT-SWAP ORCHESTRATION
      # ---------------------------------------------------------
      - name: 🧭 Map Artifact to Systemd Service & Health URL
        id: mapper
        run: |
          if [ "${{ env.TIER }}" = "production" ]; then
            TIER_SHORT="prod"
          else
            TIER_SHORT="dev"
          fi
          
          echo "CONTINUE_ORCHESTRATION=true" >> $GITHUB_ENV
          echo "BACKUP_NAME=${{ env.SIF_NAME }}.bak" >> $GITHUB_ENV
          
          case "${{ env.SAFE_NAME }}" in
            "infrastructure_db_postgres")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@postgres.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:5432" >> $GITHUB_ENV
              ;;
            "infrastructure_db_redis")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@redis.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:6379" >> $GITHUB_ENV
              ;;
            "infrastructure_db_clickhouse")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@clickhouse.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:8123/ping" >> $GITHUB_ENV
              ;;
            "infrastructure_lhci_server")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@lhci.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:9001/health" >> $GITHUB_ENV
              ;;
            "infrastructure_swetrix_rum")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@swetrix.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:5005/health" >> $GITHUB_ENV
              ;;
            "infrastructure_agentic_remediation")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@agent.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:9010/health" >> $GITHUB_ENV
              ;;
            "infrastructure_dashboard_api")
              echo "SERVICE_NAME=luminara-${TIER_SHORT}@web_api.service" >> $GITHUB_ENV
              echo "HEALTH_URL=http://127.0.0.1:4000/health" >> $GITHUB_ENV
              ;;
            *)
              echo "⚠️ Unknown target mapping for ${{ env.SAFE_NAME }}. Switching to unmanaged deployment."
              echo "CONTINUE_ORCHESTRATION=false" >> $GITHUB_ENV
              ;;
          esac

      - name: 🎒 Prepare Production Backup File
        if: env.CONTINUE_ORCHESTRATION == 'true'
        run: |
          mkdir -p ${{ env.TARGET_DIR }}
          if [ -f "${{ env.TARGET_DIR }}/${{ env.SIF_NAME }}" ]; then
            echo "Found live production artifact. Backing up for rollback-readiness..."
            cp "${{ env.TARGET_DIR }}/${{ env.SIF_NAME }}" "${{ env.TARGET_DIR }}/${{ env.BACKUP_NAME }}"
          else
            echo "No previous production artifact found. Initializing safe dummy placeholder backup..."
            touch "${{ env.TARGET_DIR }}/${{ env.BACKUP_NAME }}"
          fi

      - name: 🔄 Execute Hot-Swap & Rollback Orchestration
        if: env.CONTINUE_ORCHESTRATION == 'true'
        uses: ./.github/actions/systemd-hot-swap-rollback # Adjust if your action's directory name differs
        with:
          image_dir: "${{ env.TARGET_DIR }}"
          staging_dir: "${{ env.STAGING_DIR }}"
          artifact_name: "${{ env.SIF_NAME }}"
          backup_name: "${{ env.BACKUP_NAME }}"
          service_name: "${{ env.SERVICE_NAME }}"
          health_url: "${{ env.HEALTH_URL }}"

      - name: 🚚 Unmanaged Deployment Fallback
        if: env.CONTINUE_ORCHESTRATION == 'false'
        run: |
          echo "Deploying artifact to destination directory without service tracking..."
          mkdir -p ${{ env.TARGET_DIR }}
          mv "${{ env.STAGING_DIR }}/${{ env.SIF_NAME }}" "${{ env.TARGET_DIR }}/${{ env.SIF_NAME }}"
          echo "🚀 Successfully deployed unmanaged container asset ${{ env.SIF_NAME }}."

      # ---------------------------------------------------------
      # PHASE 6: GLOBAL FAIL-SAFE CLEANUP
      # ---------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Force-cleaning local RAM disk and runtime areas..."
          chmod -R u+rwX /dev/shm/sing_build_${{ github.run_id }}_* 2>/dev/null || true
          rm -rf /dev/shm/sing_build_${{ github.run_id }}_${{ env.SAFE_NAME }} || true
          rm -rf ${{ env.STAGING_DIR }}/${{ env.SIF_NAME }} || true
          
          echo "🗑️ Running NFS Cache Garbage Collection..."
          find /abr/coss41/singularity_cache -maxdepth 1 -type d -name "cache_*" -mtime +1 -exec rm -rf {} + || true
          echo "✅ Cleanup complete."