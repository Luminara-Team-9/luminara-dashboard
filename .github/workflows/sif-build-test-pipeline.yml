name: Luminara Containers Build Test CI/CD V2

on:
  push:
    branches: [ main ]
    paths: [ '**.def' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.def' ]

# SRE FIX: Only one build per branch/PR. New pushes cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Define where you want the final images to live
  PROD_RELEASE_PATH: "/abr/coss41/Luminara_App/images-prod"
  DEV_RELEASE_PATH: "/abr/coss41/shared_workspace/images_dev"

jobs:
  detect-changes:
    runs-on: [self-hosted, Linux]
    outputs:
      # SRE FIX: Point to our safe, intercepted output
      def_files: ${{ steps.safe_output.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - name: Get changed .def files
        id: filter
        uses: tj-actions/changed-files@v44
        with:
          files: "**/*.def"
          escape_json: false
          json: true

      - name: SRE Matrix Safety Intercept
        id: safe_output
        run: |
          FILES='${{ steps.filter.outputs.all_changed_files }}'
          # If the array is empty, inject a dummy value to prevent the GHA Matrix Crash
          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "files=[\"skip\"]" >> $GITHUB_OUTPUT
          else
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.def_files != '[]' && needs.detect-changes.outputs.def_files != ''
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        def_file: ${{ fromJson(needs.detect-changes.outputs.def_files) }}
      max-parallel: 2
      fail-fast: false
      
    steps:
      - uses: actions/checkout@v4

      # 🚨 SRE FIX: Total Parallel Isolation
      # We create a perfectly unique environment variable for this specific job BEFORE caching starts.
      # This prevents Runner A from nuking Runner B's cache during an auto-heal event.
      - name: Generate Isolated Cache Path
        run: |
          SAFE_NAME=$(echo "${{ matrix.def_file }}" | sed 's/\//_/g' | sed 's/\.def//g')
          # Create a unique path using the pipeline ID and the container name
          ISOLATED_PATH="/abr/coss41/singularity_cache/cache_${{ github.run_id }}_${SAFE_NAME}"
          echo "ISOLATED_CACHE_DIR=$ISOLATED_PATH" >> $GITHUB_ENV
          
          # Also pass SAFE_NAME forward so we don't have to calculate it again
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      # SRE FIX 2: Cache Singularity layers. 
      # This prevents re-downloading the Ubuntu/CUDA base image every single time.
      - name: Cache Singularity Layers
        uses: actions/cache@v4
        with:
          # Now the GitHub Action targets our mathematically unique NFS folder
          path: ${{ env.ISOLATED_CACHE_DIR }}
          key: singularity-cache-${{ runner.os }}-${{ hashFiles('**/*.def') }}
          restore-keys: |
            singularity-cache-${{ runner.os }}-

      - name: SRE Dynamic Routing & Variables
        run: |
          SAFE_NAME=$(echo "${{ matrix.def_file }}" | sed 's/\//_/g' | sed 's/\.def//g')
          echo "SIF_NAME=${SAFE_NAME}.sif" >> $GITHUB_ENV
          
          # 🚦 The Routing Logic
          # This checks if the file string ends exactly with "_dev.def"
          if [[ "${{ matrix.def_file }}" == *"_dev.def" ]]; then
            echo "TARGET_DIR=${{ env.DEV_RELEASE_PATH }}" >> $GITHUB_ENV
            echo "TIER=Development" >> $GITHUB_ENV
            echo "Detected DEV environment. Routing to dev_release."
          else
            echo "TARGET_DIR=${{ env.PROD_RELEASE_PATH }}" >> $GITHUB_ENV
            echo "TIER=Production" >> $GITHUB_ENV
            echo "Detected PROD environment. Routing to release."
          fi

      - name: Build SIF (Auto-Healing & Cleanup Hardened & Sudo-Free)
        run: |
          # Point Singularity to the isolated cache we created in the earlier step
          export SINGULARITY_CACHEDIR=${{ env.ISOLATED_CACHE_DIR }}
          
          # 1. THE MASSIVE DRIVE (For the final 8GB .sif file output only)
          export MASSIVE_DRIVE_PATH="/abr/coss41/shared_workspace/tmp_builds"
          mkdir -p $MASSIVE_DRIVE_PATH
          
          # Define a global env var for the rest of the job to know where the SIF physically is
          echo "SIF_PATH=$MASSIVE_DRIVE_PATH/${{ env.SIF_NAME }}" >> $GITHUB_ENV

          # 2. THE LOCAL SANDBOX (For fakeroot to extract the Linux OS without NFS blocking it)
          # We force this into /var/tmp (the local server disk) to bypass the network drive restrictions.
          export SINGULARITY_TMPDIR="/dev/shm/sing_build_${{ github.run_id }}_${SAFE_NAME}"
          export TMPDIR=$SINGULARITY_TMPDIR
          
          # Clean up any previous runs
          rm -rf $SINGULARITY_TMPDIR || true
          mkdir -p $SINGULARITY_TMPDIR
          
          
          # Open the local sandbox completely so fakeroot can work
          chmod 777 $SINGULARITY_TMPDIR
          
          echo "🚀 Attempting hybrid build: Local Sandbox -> NFS Output..."
          
          # 🚨 THE FIX: Target the local RAM disk first, not the NFS drive
          LOCAL_SIF_PATH="$SINGULARITY_TMPDIR/${{ env.SIF_NAME }}"
          
          if ! singularity build --fakeroot $MASSIVE_DRIVE_PATH/${{ env.SIF_NAME }} ${{ matrix.def_file }}; then
              echo "⚠️ Build failed! Purging local sandbox and global cache, then retrying..."
              
              rm -rf $SINGULARITY_TMPDIR || true
              mkdir -p $SINGULARITY_TMPDIR
              chmod 777 $SINGULARITY_TMPDIR

              singularity cache clean --force

              echo "🔄 Retrying build from a clean state..."
              singularity build --fakeroot $MASSIVE_DRIVE_PATH/${{ env.SIF_NAME }} ${{ matrix.def_file }}
          fi
          
          echo "✅ Build successful. Initiating secure cleanup..."
          # Reclaim permissions before deletion to prevent permission denied errors
          chmod -R u+rwX $SINGULARITY_TMPDIR 2>/dev/null || true
          rm -rf $SINGULARITY_TMPDIR

          
      - name: Smart Verification
        run: |

          # 1. Infrastructure Check
          echo "🔍 Testing SIF Integrity..."
          # Standard Anchor Checks
          singularity exec ${{ env.SIF_PATH }} ls -d /data
          singularity exec ${{ env.SIF_PATH }} ls -d /workspace

          # 2. Conditional Node.js/pnpm Check
          if grep -qE "npm install.*pnpm|curl.*pnpm" "${{ matrix.def_file }}"; then
            echo "✅ Node.js detected. Verifying pnpm..."
            singularity exec ${{ env.SIF_PATH }} pnpm --version
          fi

          # 3. Conditional Python/Pip Check (Hardened against the Grep Trap)
          # SRE FIX: Uses Regex to only trigger if Python is the base image (-E "^From:.*python") 
          # or if pip is actively being used to install something (-E "pip install").
          if grep -qE "^From:.*python|pip install" "${{ matrix.def_file }}"; then
            echo "✅ Python ecosystem detected. Verifying binaries..."
            
            # SRE FIX: Safely checks for either 'python3' or 'python' without crashing
            singularity exec ${{ env.SIF_PATH }} bash -c 'if command -v python3 >/dev/null 2>&1; then python3 --version; elif command -v python >/dev/null 2>&1; then python --version; else exit 1; fi'
            
            # SRE FIX: Safely checks for either 'pip3' or 'pip'
            singularity exec ${{ env.SIF_PATH }} bash -c 'if command -v pip3 >/dev/null 2>&1; then pip3 --version; elif command -v pip >/dev/null 2>&1; then pip --version; else exit 1; fi'
          fi

          # 4. Conditional AI/GPU Check (Hardened & Runner-Safe)
          # SRE FIX: Trigger ONLY if an NVIDIA/CUDA base image is used, 
          # or if heavy AI libraries (torch, vllm, flash-attn) are explicitly pip installed.
          if grep -qE "^From:.*(nvidia|cuda)|pip install.*(torch|vllm|flash-attn)" "${{ matrix.def_file }}"; then
            echo "✅ AI/GPU payload detected. Verifying toolchain..."
            
            # SRE FIX: Safely check for nvidia-smi. 
            # Does not crash if the GHA runner lacks a GPU or if the --nv flag is missing.
            singularity exec ${{ env.SIF_PATH }} bash -c 'if command -v nvidia-smi >/dev/null 2>&1; then nvidia-smi --version; else echo "⚠️ nvidia-smi not available in runner context (Expected without --nv flag or on CPU node)."; fi'
            
            # SRE FIX (Bonus Parity Check): Safely verify that the AI Python payload actually compiled
            singularity exec ${{ env.SIF_PATH }} bash -c 'if command -v python3 >/dev/null 2>&1; then python3 -c "import sys; import importlib.util; sys.exit(0) if importlib.util.find_spec(\"torch\") or importlib.util.find_spec(\"vllm\") else sys.exit(1)" 2>/dev/null && echo "✅ AI Python Libraries (vLLM/Torch) verified." || echo "⚠️ Warning: AI libraries not found in Python path."; fi'
          fi

      - name: Continuous Delivery (CD) Release
        if: github.ref == 'refs/heads/main' && success()
        run: |
          echo "🚀 Deploying ${{ env.TIER }} container..."
          mkdir -p ${{ env.TARGET_DIR }}
          mv ${{ env.SIF_PATH }} ${{ env.TARGET_DIR }}/
          echo "✅ Successfully routed ${{ env.SIF_PATH }} to ${{ env.TARGET_DIR }}"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up SIF artifacts..."
          # Delete the SIF from the tmp_builds folder if it wasn't moved to release
          rm -f ${{ env.SIF_PATH }}
          
          echo "🗑️ Running NFS Cache Garbage Collection..."
          # Find and delete any isolated cache folders older than 1 day to prevent NFS bloat
          # It safely ignores the cache folder created by the current run.
          find /abr/coss41/singularity_cache -maxdepth 1 -type d -name "cache_*" -mtime +1 -exec rm -rf {} + || true
          echo "✅ Cleanup complete."