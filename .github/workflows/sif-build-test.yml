name: Luminara Singularity Build Test

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: self-hosted  # Using 20.04 for better compatibility with legacy Singularity
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Singularity
        uses: eukarya-inc/setup-singularity@v1
        with:
          singularity-version: 3.7.3

      - name: Build Singularity Sandbox (Test)
        run: |
          # Note: We use 'singularity' instead of 'apptainer' now
          sudo singularity build --sandbox test_env 1_dashboard_app/luminara_dash_dev.def
          
      - name: Verify SRE Infrastructure Anchors
        run: |
          # Verify that our specific mount points exist in the baked image
          sudo singularity exec test_env ls -d /data
          sudo singularity exec test_env ls -d /workspace
          sudo singularity exec test_env pnpm --version

      - name: Cleanup
        if: always()
        run: sudo rm -rf test_env