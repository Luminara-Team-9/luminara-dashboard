name: Luminara Containers CI/CD

on:
  push:
    branches: [ main ]
    paths: [ '**.def' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.def' ]

# SRE FIX: Only one build per branch/PR. New pushes cancel old ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Define where you want the final images to live
  RELEASE_PATH: "/abr/coss41/Luminara_App/images-prod"

jobs:
  detect-changes:
    runs-on: [self-hosted, Linux]
    outputs:
      def_files: ${{ steps.filter.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@v4
      - name: Get changed .def files
        id: filter
        uses: tj-actions/changed-files@v44
        with:
          files: "**/*.def"
          escape_json: false
          json: true

  build-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.def_files != '[]' && needs.detect-changes.outputs.def_files != ''
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        def_file: ${{ fromJson(needs.detect-changes.outputs.def_files) }}
      max-parallel: 1
      fail-fast: false
      
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Variables
        run: |
          SAFE_NAME=$(echo "${{ matrix.def_file }}" | sed 's/\//_/g' | sed 's/\.def//g')
          echo "SIF_NAME=${SAFE_NAME}.sif" >> $GITHUB_ENV
          echo "SAFE_NAME=${SAFE_NAME}" >> $GITHUB_ENV

      - name: Build SIF (Sudo-Free)
        run: |
          # We build a SIF file directly to bypass NFS permission issues
          singularity build --fakeroot ${{ env.SIF_NAME }} ${{ matrix.def_file }}
          
      - name: Smart Verification
        run: |

          # 1. Infrastructure Check
          echo "🔍 Testing SIF Integrity..."
          # Standard Anchor Checks
          singularity exec ${{ env.SIF_NAME }} ls -d /data
          singularity exec ${{ env.SIF_NAME }} ls -d /workspace

          # 2. Conditional Node.js/pnpm Check
          if grep -qi "pnpm" "${{ matrix.def_file }}"; then
            echo "✅ Node.js detected. Verifying pnpm..."
            singularity exec ${{ env.SIF_NAME }} pnpm --version
          fi

          # 3. Conditional Python/Pip Check
          if grep -qi "python" "${{ matrix.def_file }}" || grep -qi "pip" "${{ matrix.def_file }}"; then
            echo "✅ Python detected. Verifying pip..."
            singularity exec ${{ env.SIF_NAME }} python3 --version
            singularity exec ${{ env.SIF_NAME }} pip3 --version
          fi

          # 4. Conditional AI/GPU Check (vLLM/CUDA)
          if grep -qi "cuda" "${{ matrix.def_file }}"; then
            echo "✅ CUDA detected. Verifying NVIDIA tools..."
            singularity exec ${{ env.SIF_NAME }} nvidia-smi --version || echo "Warning: nvidia-smi failed (Expected if not on GPU node)"
          fi

      - name: Release to Production
        # Only move the file if we are merging/pushing to MAIN
        if: github.ref == 'refs/heads/main' && success()
        run: |
          mkdir -p ${{ env.RELEASE_PATH }}
          mv ${{ env.SIF_NAME }} ${{ env.RELEASE_PATH }}/
          echo "✅ Released ${{ env.SIF_NAME }} to ${{ env.RELEASE_PATH }}"

      - name: Cleanup
        if: always()
        run: |
          # Delete the SIF from the runner folder if it wasn't moved to release
          rm -f ${{ env.SIF_NAME }}