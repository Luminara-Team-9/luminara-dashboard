name: Luminara Singularity Build Test

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    # Use your self-hosted labels
    runs-on: [self-hosted, knu-server] 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Singularity Presence
        run: |
          # This simply checks if the KNU server's Singularity is ready
          singularity --version
          which singularity

      - name: Build Singularity Sandbox (Direct on KNU)
        run: |
          # We use the absolute path for extra SRE safety
          # Replace /usr/bin/singularity if 'which singularity' gave a different path
          sudo /usr/bin/singularity build --sandbox test_env 1_dashboard_app/luminara_dash_dev.def
          
      - name: Verify SRE Infrastructure Anchors
        run: |
          sudo singularity exec test_env ls -d /data
          sudo singularity exec test_env ls -d /workspace
          sudo singularity exec test_env pnpm --version

      - name: Cleanup
        if: always()
        run: sudo rm -rf test_env