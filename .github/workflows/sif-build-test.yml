name: Luminara Singularity Build Test

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    # Use your self-hosted labels
    runs-on: [self-hosted, Linux]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Singularity Presence
        run: |
          # This simply checks if the KNU server's Singularity is ready
          singularity --version
          which singularity

      - name: Build Singularity Sandbox (Direct on KNU)
        run: |
          # 1. Removed 'sudo'
          # 2. Added '--fakeroot' to allow building without root
          singularity build --fakeroot --sandbox test_env 1_dashboard_app/luminara_dash_dev.def
          
      - name: Verify SRE Infrastructure Anchors
        run: |
          # 3. Removed 'sudo' from all verification lines
          singularity exec test_env ls -d /data
          singularity exec test_env ls -d /workspace
          singularity exec test_env pnpm --version

      - name: Cleanup
        if: always()
        run: |
          # 4. Removed 'sudo'
          # Since you built 'test_env' as yourself, you can delete it as yourself
          rm -rf test_env