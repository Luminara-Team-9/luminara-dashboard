name: Luminara Dashboard Production CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - '1_dashboard_app/**'         # Trigger if the frontend code changes
      - '0_shared_packages/**'       # Trigger if shared dependencies change
      - 'infrastructure/web.def'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  # Route everything to your massive shared drive
  PROD_RELEASE_PATH: "/abr/coss41/Luminara_App/codebase"
  TMP_BUILD_DIR: "/dev/shm"

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: THE IMMUTABLE NEXT.JS BUILD
      # ---------------------------------------------------------
      - name: Setup Node.js & PNPM
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install PNPM
        run: npm install -g pnpm@latest

      - name: Compile Next.js Application
        run: |
          echo "📦 Compiling Production Next.js App..."
          # 1. Install dependencies at the root of the monorepo so PNPM links everything
          pnpm install --frozen-lockfile
          
          # 2. Build the specific dashboard project
          pnpm --filter ./1_dashboard_app build
          
          # 3. Prepare the massive shared drive for the precise sync
          mkdir -p ${{ env.PROD_RELEASE_PATH }}/1_dashboard_app
          mkdir -p ${{ env.PROD_RELEASE_PATH }}/0_shared_packages
          
          echo "🔄 Syncing Monorepo Architecture to Production..."
          
          # Sync the root workspace files so PNPM knows how to read the structure
          rsync -av ./pnpm-workspace.yaml ${{ env.PROD_RELEASE_PATH }}/
          rsync -av ./package.json ${{ env.PROD_RELEASE_PATH }}/
          
          # Sync the shared packages (excluding any dev/test junk)
          rsync -av --exclude 'node_modules' --exclude 'tests' ./0_shared_packages/ ${{ env.PROD_RELEASE_PATH }}/0_shared_packages/
          
          # Sync the compiled Dashboard code
          rsync -av --delete ./1_dashboard_app/.next/ ${{ env.PROD_RELEASE_PATH }}/1_dashboard_app/.next/
          rsync -av --delete ./1_dashboard_app/public/ ${{ env.PROD_RELEASE_PATH }}/1_dashboard_app/public/
          rsync -av ./1_dashboard_app/package.json ${{ env.PROD_RELEASE_PATH }}/1_dashboard_app/package.json
          
          # 4. Finalizing Production Dependencies on the Host
          echo "🔒 Locking in Production Dependencies..."
          cd ${{ env.PROD_RELEASE_PATH }}
          # This runs extremely fast because PNPM uses a global virtual store, 
          # but it ensures all the symlinks for 0_shared_packages are wired up perfectly!
          pnpm install --prod --frozen-lockfile

      # ---------------------------------------------------------
      # PHASE 2: THE SINGULARITY CONTAINER BUILD
      # ---------------------------------------------------------
      - name: Build Immutable Dashboard SIF
        run: |
          export SINGULARITY_TMPDIR="${{ env.TMP_BUILD_DIR }}/sing_build_${{ github.run_id }}"
          export SINGULARITY_CACHEDIR="/abr/coss41/singularity_cache/cache_${{ github.run_id }}"
          
          mkdir -p $SINGULARITY_TMPDIR $SINGULARITY_CACHEDIR
          chmod 777 $SINGULARITY_TMPDIR
          
          echo "🚀 Building Dashboard Container..."
          # Point the builder to the infrastructure folder!
          if ! singularity build --fakeroot web_prod.sif infrastructure/web.def; then
              echo "⚠️ Build failed! Purging cache and retrying..."
              rm -rf $SINGULARITY_CACHEDIR || true
              mkdir -p $SINGULARITY_CACHEDIR
              singularity build --fakeroot web_prod.sif infrastructure/web.def
          fi
          
          echo "✅ Shipping to Production Directory..."
          mv web_prod.sif ${{ env.PROD_RELEASE_PATH }}/
          
          # Clean up
          chmod -R u+rwX $SINGULARITY_TMPDIR 2>/dev/null || true
          rm -rf $SINGULARITY_TMPDIR
          rm -rf $SINGULARITY_CACHEDIR || true

      # ---------------------------------------------------------
      # PHASE 3: ZERO-DOWNTIME RESTART
      # ---------------------------------------------------------
      - name: Hot-Swap Production Container
        run: |
          echo "🔄 Restarting Singularity Instance..."
          singularity instance stop luminara_web_live || true
          
          singularity instance start \
            --bind ${{ env.PROD_RELEASE_PATH }}:/workspace \
            ${{ env.PROD_RELEASE_PATH }}/web_prod.sif \
            luminara-web-live