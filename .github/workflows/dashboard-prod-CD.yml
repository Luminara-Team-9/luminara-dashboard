name: "4. [Push-Dashboard] Dashboard Deployer"

on:
  push:
    branches: [ main ]
    paths:
      - '1_dashboard_app/**'
      - '0_shared_packages/**'
      - 'infrastructure/web.def'

concurrency:
  # Crucial: Cancels older deployments if multiple PRs merge concurrently
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  deploy-to-prod:
    runs-on: [self-hosted, Linux]
    
    env:
      IMAGE_DIR: /abr/coss41/Luminara_App/images-prod
      STAGING_DIR: /abr/coss41/Luminara_App/images-staging
      ARTIFACT_NAME: infrastructure_web.sif
      BACKUP_NAME: infrastructure_web.bak.sif
      SERVICE_NAME: luminara-prod@web.service
      HEALTH_URL: http://localhost:3001

    steps:
      - name: 📥 Checkout Merged Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: CREATE ROLLBACK BACKUP
      # ---------------------------------------------------------
      - name: 💾 Backup Stable Container
        run: |
          echo "🔍 Preparing directories..."
          mkdir -p ${{ env.IMAGE_DIR }} ${{ env.STAGING_DIR }}
          
          if [ -f "${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }}" ]; then
            echo "💾 Backing up current production container..."
            cp ${{ env.IMAGE_DIR }}/${{ env.ARTIFACT_NAME }} ${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}
          else
            echo "ℹ️ No existing production SIF found. Skipping backup."
          fi

      # ---------------------------------------------------------
      # PHASE 2: BAKE ON MAIN (Race-Condition Fix)
      # ---------------------------------------------------------
      - name: 🏗️ Bake Fresh Production Artifact
        # We ALWAYS build from the freshly merged main branch! No stale artifacts.
        uses: ./.github/actions/build-sif-images
        with:
          def_file_path: "infrastructure/web.def" 
          cache_key_suffix: "prod_dashboard"
          output_path: "${{ env.STAGING_DIR }}/${{ env.ARTIFACT_NAME }}"

      # ---------------------------------------------------------
      # PHASE 3: HOT-SWAP, HEALTH CHECK & AUTOMATED ROLLBACK
      # ---------------------------------------------------------
      - name: 🚀 Hot-Swap & Verify
        uses: ./.github/actions/systemd-hot-swap
        with:
          # Note: Ensure env.IMAGE_DIR is used instead of env.PROD_SIF_PATH for consistency
          image_dir: ${{ env.IMAGE_DIR }} 
          staging_dir: ${{ env.STAGING_DIR }}
          artifact_name: ${{ env.ARTIFACT_NAME }}
          backup_name: ${{ env.BACKUP_NAME }}
          service_name: ${{ env.SERVICE_NAME }}
          health_url: ${{ env.HEALTH_URL }}

      # ---------------------------------------------------------
      # PHASE 4: GLOBAL JANITOR (Fail-Safe Cleanup)
      # ---------------------------------------------------------
      - name: 🧹 Post-Deployment Cleanup
        if: always() 
        run: |
          echo "🧹 Cleaning up temporary artifacts..."
          
          # 1. Clear staging (In case build finished but move failed)
          rm -f "${{ env.STAGING_DIR }}/${{ env.ARTIFACT_NAME }}"
          
          # 2. Clear backup (If success, it's old; if rollback, it's already moved)
          rm -f "${{ env.IMAGE_DIR }}/${{ env.BACKUP_NAME }}"

          # 3. Comprehensive RAM Disk Cleanup
          echo "🧹 Force-cleaning local RAM disk (Fail-safe)..."
          find /dev/shm/ -name "sing_build_*_prod_dashboard" -exec chmod -R u+rwX {} + 2>/dev/null || true
          find /dev/shm/ -name "sing_build_*_prod_dashboard" -exec rm -rf {} + 2>/dev/null || true
          
          echo "✨ Environment is now clean."