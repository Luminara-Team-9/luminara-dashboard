name: "2. [Push-Prod] Dashboard Deployer"

on:
  push:
    branches: [ main ]
    paths:
      - '1_dashboard_app/**'
      - '0_shared_packages/**'
      - 'infrastructure/web.def'

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  PROD_CODE_PATH: "/abr/coss41/Luminara_App/codebase"
  PROD_SIF_PATH: "/abr/coss41/Luminara_App/images-prod"
  STAGING_PATH: "/abr/coss41/Luminara_App/images-staging"

jobs:
  deploy-to-prod:
    runs-on: [self-hosted, Linux]
    
    steps:
      - name: Checkout Merged Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # PHASE 1: FAST-SYNC PRODUCTION CODEBASE
      # ---------------------------------------------------------
      - name: Sync Source Code & Dependencies
        run: |
          echo "📦 Fast-syncing code to production directory..."
          npm install -g pnpm@latest
          pnpm install --frozen-lockfile
          pnpm --filter ./1_dashboard_app build
          
          mkdir -p ${{ env.PROD_CODE_PATH }}/1_dashboard_app
          mkdir -p ${{ env.PROD_CODE_PATH }}/0_shared_packages
          
          rsync -av ./pnpm-workspace.yaml ${{ env.PROD_CODE_PATH }}/
          rsync -av ./package.json ${{ env.PROD_CODE_PATH }}/
          rsync -av --exclude 'node_modules' --exclude 'tests' ./0_shared_packages/ ${{ env.PROD_CODE_PATH }}/0_shared_packages/
          
          rsync -av --delete ./1_dashboard_app/.next/ ${{ env.PROD_CODE_PATH }}/1_dashboard_app/.next/
          rsync -av --delete ./1_dashboard_app/public/ ${{ env.PROD_CODE_PATH }}/1_dashboard_app/public/
          rsync -av ./1_dashboard_app/package.json ${{ env.PROD_CODE_PATH }}/1_dashboard_app/package.json
          
          cd ${{ env.PROD_CODE_PATH }}
          pnpm install --prod --frozen-lockfile

      # ---------------------------------------------------------
      # PHASE 2: LOCATE STAGED ARTIFACTS
      # ---------------------------------------------------------
      - name: Locate Staged Artifacts
        id: staging_check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -o -E '#[0-9]+' | head -1 | sed 's/#//')
          STAGED_FILE="${{ env.STAGING_PATH }}/pr_${PR_NUMBER}.sif"
          
          if [ -n "$PR_NUMBER" ] && [ -f "$STAGED_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "pr_file=$STAGED_FILE" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # PHASE 3: BACKUP, PROMOTE, OR FLAG FOR EMERGENCY
      # ---------------------------------------------------------
      - name: Create Rollback Backup
        run: |
          echo "💾 Backing up current production container..."
          mkdir -p ${{ env.PROD_SIF_PATH }}
          cp ${{ env.PROD_SIF_PATH }}/web_prod.sif ${{ env.PROD_SIF_PATH }}/web_prod.bak.sif || echo "ℹ️ No previous SIF found to backup."

      - name: Artifact Promotion or Emergency Flag
        run: |
          if [ "${{ steps.staging_check.outputs.found }}" == "true" ]; then
            echo "✅ Promoting staged container for PR..."
            cp ${{ steps.staging_check.outputs.pr_file }} ${{ env.PROD_SIF_PATH }}/web_prod.sif
            echo "EMERGENCY_BUILD=false" >> $GITHUB_ENV
          else
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "infrastructure/web.def"; then
              echo "🚨 Direct push to web.def detected! Flagging for fully hardened Emergency Build..."
              echo "EMERGENCY_BUILD=true" >> $GITHUB_ENV
            else
              echo "ℹ️ No changes to web.def. Using existing SIF."
              echo "EMERGENCY_BUILD=false" >> $GITHUB_ENV
            fi
          fi

      # ---------------------------------------------------------
      # PHASE 4: EMERGENCY FALLBACK BUILD (CONDITIONAL)
      # ---------------------------------------------------------
      - name: Run Emergency Fallback Build
        if: env.EMERGENCY_BUILD == 'true'
        uses: ./.github/actions/build-sif
        with:
          def_file_path: "infrastructure/web.def"
          cache_key_suffix: "emergency_dashboard"
          output_path: "${{ env.PROD_SIF_PATH }}/web_prod.sif"

      # ---------------------------------------------------------
      # PHASE 5: HOT-SWAP, HEALTH CHECK & AUTOMATED ROLLBACK
      # ---------------------------------------------------------
      - name: Hot-Swap & Verify Production Container
        run: |
          echo "🔄 Restarting Singularity Instance..."
          singularity instance stop luminara_web_live || true
          
          singularity instance start \
            --bind ${{ env.PROD_CODE_PATH }}:/workspace \
            ${{ env.PROD_SIF_PATH }}/web_prod.sif \
            luminara_web_live
            
          echo "⏱️ Waiting 5 seconds for application to boot..."
          sleep 5
          
          echo "🩺 Performing Health Check..."
          if singularity instance list | grep -q "luminara_web_live"; then
            echo "✅ Health Check Passed: Container is alive and running!"
          else
            echo "❌ CRITICAL FAILURE: Container died immediately after booting."
            echo "⏪ INITIATING AUTOMATED ROLLBACK TO PREVIOUS STABLE CONTAINER..."
            
            singularity instance stop luminara_web_live || true
            mv ${{ env.PROD_SIF_PATH }}/web_prod.bak.sif ${{ env.PROD_SIF_PATH }}/web_prod.sif
            
            singularity instance start \
              --bind ${{ env.PROD_CODE_PATH }}:/workspace \
              ${{ env.PROD_SIF_PATH }}/web_prod.sif \
              luminara_web_live
              
            echo "🚨 Rollback complete. Production is back online, but this deployment failed."
            exit 1
          fi

      # ---------------------------------------------------------
      # PHASE 6: FAIL-SAFE CLEANUP
      # ---------------------------------------------------------
      - name: Garbage Collection
        if: always()
        run: |
          echo "🧹 Cleaning up 3-day old PR artifacts..."
          find ${{ env.STAGING_PATH }} -type f -name "*.sif" -mtime +3 -exec rm {} \; || true
          
          echo "🧹 Force-cleaning local RAM disk (Fail-safe)..."
          chmod -R u+rwX /dev/shm/sing_build_*_emergency_dashboard 2>/dev/null || true
          rm -rf /dev/shm/sing_build_*_emergency_dashboard || true